apiVersion: batch/v1
kind: CronJob
metadata:
  name: mycj
spec:
  jobTemplate:
    metadata:
      name: mycj
    spec:
      startingDeadlineSeconds: 17
      template:
        metadata: {}
        spec:
          containers:
          - command:
            - /bin/sh
            - -c
            - date; echo Hello from the Kubernetes cluster
            image: busybox
            name: mycj
            resources: {}
          restartPolicy: OnFailure
  schedule: '* * * * *'
status: {}
